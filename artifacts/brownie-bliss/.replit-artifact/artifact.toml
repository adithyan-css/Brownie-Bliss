kind = "web"
  previewPath = "/"
  title = "Brownie Bliss"
  version = "1.0.0"
  id = "artifacts/brownie-bliss"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 24652

  [services.development]
  run = "pnpm --filter @workspace/brownie-bliss run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/brownie-bliss", "run", "build" ]
  publicDir = "artifacts/brownie-bliss/dist/public"
  serve = "static"

  [services.env]
  PORT = "24652"
  BASE_PATH = "/"
  