<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In ΓÇö Brownie Bliss</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      padding: 20px;
      margin-top: 72px;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 420px;
      width: 100%;
      padding: 40px;
      border: 1px solid var(--cream-dark);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: var(--text-mid);
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--brown-dark);
      text-transform: uppercase;
    }

    .form-input {
      padding: 12px 16px;
      border: 1px solid var(--cream-dark);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      background: var(--cream);
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-mid);
      opacity: 0.6;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--gold);
    }

    .remember-me label {
      font-size: 13px;
      color: var(--text-mid);
      cursor: pointer;
    }

    .forgot-password {
      font-size: 13px;
    }

    .forgot-password a {
      color: var(--gold);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-password a:hover {
      color: var(--brown-dark);
    }

    .submit-btn {
      background: var(--gold);
      color: var(--brown-dark);
      border: 2px solid var(--gold);
      padding: 14px 28px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'DM Sans', sans-serif;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    .submit-btn:hover {
      background: var(--brown-dark);
      color: var(--gold);
      border-color: var(--brown-dark);
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(212, 175, 55, 0.4);
    }

    .submit-btn:active {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(212, 175, 55, 0.3);
    }

    .submit-btn:focus {
      outline: none;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25), 0 0 0 4px rgba(212, 175, 55, 0.2);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .submit-btn:disabled:hover {
      background: var(--gold);
      color: var(--brown-dark);
      border-color: var(--gold);
    }

    /* Dark Mode Styles */
    .dark .submit-btn {
      background: #d4a852;
      color: #ffffff;
      border-color: #d4a852;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
    }

    .dark .submit-btn:hover {
      background: #c49840;
      color: #ffffff;
      border-color: #c49840;
      box-shadow: 0 12px 28px rgba(212, 175, 55, 0.6);
    }

    .dark .submit-btn:active {
      box-shadow: 0 6px 16px rgba(212, 175, 55, 0.5);
    }

    .dark .submit-btn:focus {
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4), 0 0 0 4px rgba(212, 175, 55, 0.3);
    }

    .dark .submit-btn:disabled {
      background: #6b5a35;
      color: #a0a0a0;
      border-color: #6b5a35;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .dark .submit-btn:disabled:hover {
      background: #6b5a35;
      color: #a0a0a0;
      border-color: #6b5a35;
    }

    /* Dark Mode Text Styles */
    .dark .auth-title {
      color: #f5f5f5;
    }

    .dark .auth-subtitle {
      color: #b0b0b0;
    }

    .dark .form-label {
      color: #e8d5a6;
    }

    .dark .form-input {
      background: #2a2a2a;
      color: #f5f5f5;
      border-color: #3d3d3d;
    }

    .dark .form-input:focus {
      background: #333333;
      border-color: #d4a852;
    }

    .dark .form-input::placeholder {
      color: #808080;
    }

    .dark .remember-me label {
      color: #b0b0b0;
    }

    .dark .forgot-password a {
      color: #d4a852;
    }

    .dark .forgot-password a:hover {
      color: #e8d5a6;
    }

    .dark .auth-link {
      color: #b0b0b0;
    }

    .dark .auth-link a {
      color: #d4a852;
    }

    .dark .auth-link a:hover {
      color: #e8d5a6;
    }

    .dark .auth-card {
      background: #1f1f1f;
      border-color: #3d3d3d;
    }

    .dark .error-message {
      background: rgba(217, 83, 79, 0.2);
      border-color: rgba(217, 83, 79, 0.5);
      color: #ff9999;
    }

    .dark .success-message {
      background: rgba(92, 184, 92, 0.2);
      border-color: rgba(92, 184, 92, 0.5);
      color: #99ff99;
    }

    .dark .loading {
      color: #b0b0b0;
    }

    .auth-divider {
      text-align: center;
      margin: 24px 0;
      color: var(--text-mid);
      font-size: 13px;
      position: relative;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: var(--cream-dark);
    }

    .auth-divider::before {
      left: 0;
    }

    .auth-divider::after {
      right: 0;
    }

    .auth-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-mid);
    }

    .auth-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-link a:hover {
      color: var(--brown-dark);
    }

    .error-message {
      background: rgba(217, 83, 79, 0.1);
      border: 1px solid rgba(217, 83, 79, 0.3);
      color: #8B0000;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(92, 184, 92, 0.1);
      border: 1px solid rgba(92, 184, 92, 0.3);
      color: #5cb85c;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--text-mid);
      font-size: 12px;
      margin-top: 12px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--cream-dark);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading.show {
      display: block;
    }

    @media (max-width: 600px) {
      .auth-card {
        padding: 28px 20px;
      }

      .auth-title {
        font-size: 24px;
      }

      .checkbox-group {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-name">Brownie Bliss</span>
        <span class="logo-sub">Homemade Treats</span>
      </a>
      <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#products">Products</a>
        <a href="index.html#birthday">Birthday Cakes</a>
        <a href="index.html#contact">Contact</a>
        <a href="track.html">Track Order</a>
      </nav>
      <div class="header-actions">
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()"
          aria-label="Toggle dark mode" title="Toggle dark mode">
          <span id="themeIcon">≡ƒîÖ</span>
        </button>
        <button class="cart-btn" onclick="openCart()">
          ≡ƒ¢Æ Cart
          <span class="cart-count" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- AUTH CONTAINER -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" name="email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" name="password" placeholder="ΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇó" required>
        </div>

        <div class="checkbox-group">
          <div class="remember-me">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <label for="rememberMe">Remember me for 90 days</label>
          </div>
          <div class="forgot-password">
            <a href="forgot-password.html">Forgot password?</a>
          </div>
        </div>

        <button type="submit" class="submit-btn">Sign In</button>
        <div id="loading" class="loading">
          <span class="spinner"></span>Signing in...
        </div>
      </form>

      <div class="auth-link">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="script.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberMeInput = document.getElementById('rememberMe');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const loadingDiv = document.getElementById('loading');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      loadingDiv.classList.add('show');
      loginForm.style.opacity = '0.5';
      loginForm.style.pointerEvents = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailInput.value,
            password: passwordInput.value,
            rememberMe: rememberMeInput.checked
          })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('authToken', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          showSuccess('Login successful! Redirecting...');
          setTimeout(() => {
            const redirectTo = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';
            window.location.href = redirectTo;
          }, 1000);
        } else {
          showError(data.message || 'Login failed');
        }
      } catch (err) {
        showError('Network error. Please try again.');
        console.error(err);
      } finally {
        loadingDiv.classList.remove('show');
        loginForm.style.opacity = '1';
        loginForm.style.pointerEvents = 'auto';
      }
    });

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.add('show');
    }

    function showSuccess(msg) {
      successMessage.textContent = msg;
      successMessage.classList.add('show');
    }
  </script>

</body>

</html>
