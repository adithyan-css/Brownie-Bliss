<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Brownie Bliss</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      padding: 20px;
      margin-top: 72px;
    }

    .auth-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 420px;
      width: 100%;
      padding: 40px;
      border: 1px solid var(--cream-dark);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: var(--text-mid);
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--brown-dark);
      text-transform: uppercase;
    }

    .form-input {
      padding: 12px 16px;
      border: 1px solid var(--cream-dark);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      background: var(--cream);
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-mid);
      opacity: 0.6;
    }

    .submit-btn {
      background: var(--gold);
      color: var(--brown-dark);
      border: none;
      padding: 14px 28px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'DM Sans', sans-serif;
      margin-top: 8px;
    }

    .submit-btn:hover {
      background: var(--cream);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-mid);
    }

    .auth-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-link a:hover {
      color: var(--brown-dark);
    }

    .error-message {
      background: rgba(217, 83, 79, 0.1);
      border: 1px solid rgba(217, 83, 79, 0.3);
      color: #8B0000;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(92, 184, 92, 0.1);
      border: 1px solid rgba(92, 184, 92, 0.3);
      color: #5cb85c;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--text-mid);
      font-size: 12px;
      margin-top: 12px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--cream-dark);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading.show {
      display: block;
    }

    .helper-text {
      font-size: 12px;
      color: var(--text-mid);
      margin-top: 8px;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .auth-card {
        padding: 28px 20px;
      }

      .auth-title {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-name">Brownie Bliss</span>
        <span class="logo-sub">Homemade Treats</span>
      </a>
      <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#products">Products</a>
        <a href="index.html#birthday">Birthday Cakes</a>
        <a href="index.html#contact">Contact</a>
        <a href="track.html">Track Order</a>
      </nav>
      <div class="header-actions">
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()"
          aria-label="Toggle dark mode" title="Toggle dark mode">
          <span id="themeIcon">🌙</span>
        </button>
        <button class="cart-btn" onclick="openCart()">
          🛒 Cart
          <span class="cart-count" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- AUTH CONTAINER -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">We'll send you instructions to reset your password</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form class="auth-form" id="resetForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" name="email" placeholder="john@example.com" required>
          <p class="helper-text">Enter the email address associated with your account</p>
        </div>

        <button type="submit" class="submit-btn">Send Reset Link</button>
        <div id="loading" class="loading">
          <span class="spinner"></span>Sending reset link...
        </div>
      </form>

      <div class="auth-link">
        Remember your password? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="script.js"></script>
  <script>
    const resetForm = document.getElementById('resetForm');
    const emailInput = document.getElementById('email');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const loadingDiv = document.getElementById('loading');

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      loadingDiv.classList.add('show');
      resetForm.style.opacity = '0.5';
      resetForm.style.pointerEvents = 'none';

      try {
        // Note: This endpoint would need to be implemented in the backend
        // For now, we'll show a user-friendly message
        showSuccess('Password reset link has been sent to your email. Check your inbox and spam folder.');
        setTimeout(() => {
          // In a real implementation, this would redirect after a delay
        }, 3000);
      } catch (err) {
        showError('An error occurred. Please try again.');
        console.error(err);
      } finally {
        loadingDiv.classList.remove('show');
        resetForm.style.opacity = '1';
        resetForm.style.pointerEvents = 'auto';
      }
    });

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.add('show');
    }

    function showSuccess(msg) {
      successMessage.textContent = msg;
      successMessage.classList.add('show');
    }
  </script>

</body>

</html>
